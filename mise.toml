[tools]
python = "3.12"
node = "22.14"

[tasks.start]
description = "Run docker compose in detached mode"
run = """
docker compose up -d --build
"""

[tasks.clean-all]
description = "Stop containers, remove images and all volumes"
run = """
echo "Stopping containers..."
docker compose down
echo "Removing images..."
docker rmi sharks-enlightenment-v2-front sharks-enlightenment-v2-back || true
echo "Removing specific volumes..."
docker volume rm sharks-enlightenment-v2_media_volume sharks-enlightenment-v2_static_volume || true
echo "Removing dangling volumes..."
docker volume prune -f
"""

[tasks.clean]
description = "Stop containers, remove images and static volume"
run = """
echo "Stopping containers..."
docker compose down
echo "Removing images..."
docker rmi sharks-enlightenment-v2-front sharks-enlightenment-v2-back || true
echo "Removing specific volumes..."
docker volume rm sharks-enlightenment-v2_static_volume || true
echo "Removing dangling volumes..."
docker volume prune -f
"""

[tasks.restart]
description = "Clean and restart containers"
run = """
mise clean && mise start
"""

[tasks.migrate]
description = "Apply Django migrations inside the running container"
run = """
echo "Applying migrations..."
docker exec -it sharks-enlightenment-v2-back-1 sh -c "./manage.py makemigrations && ./manage.py migrate"
"""

[tasks.backup]
description = "Backup database to a timestamped JSON file via Django dumpdata"
run = """
if docker ps | grep -q "sharks-enlightenment-v2-back"; then
  echo "Backend already running."
elif docker ps -a | grep "sharks-enlightenment-v2-back" | grep -q "Exited"; then
  echo "Backend container exists but stopped. Starting services"
  docker compose up -d postgres back
  sleep 3
else
  echo "No backend container found. Starting services..."
  docker compose up -d postgres back
  sleep 3
fi

mkdir -p back/backups
filename="backup_$(date +%Y%m%d_%H%M%S).json"
docker exec sharks-enlightenment-v2-back-1 sh -c "./manage.py dumpdata --exclude=contenttypes --exclude=auth.Permission --exclude=wagtailcore.GroupCollectionPermission --exclude=sessions --exclude=admin.LogEntry --indent 2" > "back/backups/$filename"
echo "Backup saved to back/backups/$filename"
"""

[tasks.restore]
description = "Restore database from a backup file. Usage: BACKUP_FILE=filename mise run restore"
run = """
echo "Available backups:"
ls -1 back/backups/ 2>/dev/null || echo "(no backups found)"
echo "---"
if [ -z "$BACKUP_FILE" ]; then
  echo "Usage: BACKUP_FILE=<filename> mise run restore"
  echo "Example: BACKUP_FILE=backup_20250101_120000.json mise run restore"
  exit 1
fi
docker exec -i sharks-enlightenment-v2-back-1 sh -c "./manage.py loaddata /app/backups/$BACKUP_FILE"
echo "Restore completed from $BACKUP_FILE"
"""

[tasks.back-shell]
description = "Open a shell inside the running backend container"
run = """
docker exec -it sharks-enlightenment-v2-back-1 /bin/bash
"""

[tasks.list-backups]
description = "List available database backups"
run = """
ls -lh back/backups/ 2>/dev/null || echo "No backups found"
"""

[tasks.push-to-prod]
description = "Taks to merger main into master and push"
run = """
git checkout master && git merge main && git push && git checkout main
"""

[tasks.lint]
description = "Auto-fix lint issues with ruff"
run = """
docker compose run --rm --no-deps back ruff check --fix . && docker compose run --rm --no-deps back ruff format .
"""

[tasks.test-back]
description = "Run Django tests with SQLite"
run = """
docker compose run --rm --no-deps \
  -e DJANGO_SETTINGS_MODULE=back.settings.test \
  back python manage.py test
"""

[tasks.test-front]
description = "Run Vitest frontend tests"
run = """
docker compose run --rm --no-deps front npm run test
"""

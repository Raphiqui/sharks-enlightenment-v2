{% load wagtailcore_tags %}

<div
  class="experiences-header text-center mb-16 opacity-0 translate-y-10 transition-all duration-1000"
>
  {% if value.eyebrow %}
  <span
    class="inline-block px-4 py-1 mb-4 text-sm text-ocean-glow border border-ocean-glow/30 rounded-full"
  >
    {{ value.eyebrow }}
  </span>
  {% endif %}
  <h2
    class="font-serif text-4xl md:text-5xl lg:text-6xl font-bold text-foreground mb-4"
  >
    <span style="text-wrap: balance"
      >{{ value.title }}</span
    >
  </h2>
  {% if value.subtitle %}
  <p class="max-w-2xl mx-auto text-foreground/70 text-lg">
    {{ value.subtitle }}
  </p>
  {% endif %}
</div>

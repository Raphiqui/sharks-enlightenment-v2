{% load wagtailcore_tags navigation_tags %} 
{% load static %}

{# ========== HERO SECTION ========== #}
<section
  class="relative min-h-screen flex items-center justify-center overflow-hidden"
>
  {# Background Image #}
  <div class="absolute inset-0">
    <img
      src="{% static 'images/shark-tunnel-hero.jpg' %}"
      alt="Ocean underwater scene"
      class="w-full h-full object-cover"
    />
    <div
      class="absolute inset-0"
      style="
        background: linear-gradient(
          to bottom,
          color-mix(in oklch, var(--background), transparent 60%),
          color-mix(in oklch, var(--background), transparent 40%),
          var(--background)
        );
      "
    ></div>
  </div>

  {# Animated Bubbles Container #}
  <div
    id="hero-bubbles"
    class="absolute inset-0 overflow-hidden pointer-events-none"
  ></div>

  {# Light Rays Effect #}
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div
      class="light-ray"
      style="
        left: 25%;
        width: 8rem;
        transform: rotate(-12deg);
        animation: light-ray 8s ease-in-out infinite;
      "
    ></div>
    <div
      class="light-ray"
      style="
        left: 50%;
        width: 6rem;
        transform: rotate(6deg);
        animation: light-ray 8s ease-in-out infinite 2s;
        background: linear-gradient(
          to bottom,
          color-mix(in oklch, var(--ocean-glow), transparent 92%),
          color-mix(in oklch, var(--ocean-glow), transparent 97%),
          transparent
        );
      "
    ></div>
    <div
      class="light-ray"
      style="
        right: 25%;
        width: 10rem;
        transform: rotate(-3deg);
        animation: light-ray 12s ease-in-out infinite 1s;
        background: linear-gradient(
          to bottom,
          color-mix(in oklch, var(--ocean-glow), transparent 94%),
          color-mix(in oklch, var(--ocean-glow), transparent 98%),
          transparent
        );
      "
    ></div>
  </div>

  {# Scroll Indicator #}
  <div
    class="absolute bottom-10 left-1/2"
    style="animation: bounce 1s infinite"
  >
    <svg
      class="w-8 h-8 text-ocean-glow/60"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="2"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M19 14l-7 7m0 0l-7-7m7 7V3"
      />
    </svg>
  </div>
</section>

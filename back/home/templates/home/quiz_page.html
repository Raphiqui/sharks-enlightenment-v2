{% extends "base.html" %}
{% load static %}
{% load wagtailcore_tags %}
{% load i18n %}
{% block body_class %}template-quizpage{% endblock %}

{% block content %}

<section class="pt-32 pb-24 min-h-screen">
  <div class="w-full max-w-4xl mx-auto px-6">

    {# Section Header #}
    <div class="text-center mb-12" style="animation: fade-in-up 0.8s ease-out forwards;">
      <span
        class="inline-block px-4 py-1.5 mb-6 text-sm text-ocean-glow border border-ocean-glow/30 rounded-full backdrop-blur-sm"
        style="background-color: color-mix(in oklch, var(--background), transparent 80%);">
        Test Your Knowledge <!-- TODO: add a title field into the model -->
      </span>
      <h1 class="font-serif text-4xl md:text-6xl font-bold text-foreground mb-6">
        <span style="text-wrap: balance;">Shark Quiz</span>
      </h1>
    </div>

    {# Quiz Container #}
    <div class="rounded-2xl p-8 md:p-12 backdrop-blur-md border border-border/50"
      style="background-color: color-mix(in oklch, var(--card), transparent 30%); animation: fade-in-up 0.8s ease-out forwards; animation-delay: 0.2s; opacity: 0;">
      <div id="quiz"></div>
    </div>
  </div>
</section>

{% endblock content %}
